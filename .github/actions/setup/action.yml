name: Setup
description: Setup Node.js and pnpm

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v5

    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install dependencies
      uses: pnpm/action-setup@v5
      with:
        run_install: |
          - recursive: true
            args: [--frozen-lockfile, --strict-peer-dependencies]
